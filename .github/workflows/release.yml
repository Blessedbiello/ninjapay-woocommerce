name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Install production deps
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-progress

      - name: Build zip
        run: |
          mkdir -p build
          rsync -a --exclude='.git*' --exclude='tests' --exclude='bin' \
                --exclude='phpcs.xml' --exclude='phpunit.xml' --exclude='composer.lock' \
                --exclude='build' --exclude='node_modules' \
                ./ build/ninjapay-woocommerce/
          cd build && zip -r ninjapay-woocommerce.zip ninjapay-woocommerce

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/ninjapay-woocommerce.zip
          generate_release_notes: true
